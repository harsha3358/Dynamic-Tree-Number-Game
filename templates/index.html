<!DOCTYPE html>
<html>
<head>
    <title>🧠 Guess The Number AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🎮 Think a Number (1-10)</h1>

        <button onclick="sendAnswer('no')">No 👎</button>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
